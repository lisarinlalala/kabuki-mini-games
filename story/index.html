<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>引窓 Story</title>
<style>
:root{--red:#8d2027;--gold:#d7aa35;--paper:#f5ecd1;--wood:#6f4b34;--ink:#2d211b}
*{box-sizing:border-box}body{margin:0;background:#171411;color:var(--ink);font-family:"Yu Mincho","Hiragino Mincho ProN",serif;display:flex;justify-content:center}.app{width:min(100%,720px);min-height:100svh;background:linear-gradient(#f8f1dc,#dcc28b);overflow:hidden;position:relative}.bar{height:58px;background:var(--red);color:#fff7df;display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:4px solid #4d1115;position:relative;z-index:20}.bar h1{font-size:clamp(20px,5vw,28px);margin:0;letter-spacing:.08em}.bar a{color:#fff7df;text-decoration:none;border:1px solid #fff7df;border-radius:999px;padding:7px 11px;font-family:sans-serif;font-size:13px}.hud{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 14px;background:#fff9e8e8;position:relative;z-index:15}.hud p{margin:0;font-size:clamp(14px,4vw,18px);line-height:1.45}.coins{display:flex;gap:5px}.coin{width:25px;height:31px;border-radius:48%;display:grid;place-items:center;background:var(--gold);border:2px solid #8b6512;box-shadow:inset 0 0 0 3px #f3ce63;font:700 13px sans-serif;color:#654200;transition:.25s}.coin.used{opacity:.2;transform:scale(.8)}
.stage{position:relative;min-height:calc(100svh - 116px);overflow:hidden;background:linear-gradient(#26364a 0 16%,#52606b 16% 18%,transparent 18%),linear-gradient(#f5ecd1,#d8c18f)}.moon{position:absolute;top:24px;left:11%;width:55px;height:55px;border-radius:50%;background:#f4df9a;box-shadow:0 0 18px #f4df9a88}.house{position:absolute;left:7%;right:7%;top:12%;bottom:7%;background:#bd9366;border:10px solid var(--wood);box-shadow:0 12px 25px #0005}.room{position:absolute;inset:0;background:linear-gradient(#fff9e8,#e0c48b)}.tatami{position:absolute;left:0;right:0;bottom:0;height:23%;background:repeating-linear-gradient(90deg,#4e5e2d33 0 1px,transparent 1px 26px),#b3a970;border-top:4px solid #706635}.shoji{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;z-index:10;pointer-events:none}.panel{background:repeating-linear-gradient(to right,transparent 0 22%,#76553f 22% 24%,transparent 24% 48%),repeating-linear-gradient(to bottom,#f8f1d8ee 0 18%,#76553f 18% 20%,#f8f1d8ee 20% 38%);border:6px solid #76553f;transition:transform 1.1s cubic-bezier(.3,.8,.2,1)}.shoji.open .left{transform:translateX(-92%)}.shoji.open .right{transform:translateX(92%)}
.person{position:absolute;left:50%;top:50%;width:min(48vw,260px);height:min(64vw,360px);max-height:56%;min-width:165px;min-height:245px;transform:translate(-50%,-43%);z-index:7;transition:left 1.3s ease-in,opacity .5s .8s,transform .3s}.person.escape{left:125%;opacity:.25;transform:translate(-50%,-43%) rotate(7deg)}.person.mie{animation:mie .55s ease-in-out 2}@keyframes mie{50%{transform:translate(-50%,-43%) rotate(-2deg) scale(1.045)}}.body{position:absolute;left:20%;right:20%;bottom:0;height:62%;border-radius:45% 45% 12% 12%;background:repeating-linear-gradient(45deg,#2b5c73 0 14px,#efd4a0 14px 18px,#2b5c73 18px 32px);border:4px solid #26323a}.head{position:absolute;left:27%;top:8%;width:46%;height:43%;border-radius:46%;background:#e4b079;border:4px solid #402d25;z-index:3}.hair{position:absolute;left:-6%;top:-13%;width:112%;height:43%;border-radius:50% 50% 34% 34%;background:#231b19;border:3px solid #111}.brow,.eye,.nose,.mouth{position:absolute}.brow{top:43%;width:24%;height:5px;background:#31211e;border-radius:50%}.brow.l{left:16%;transform:rotate(-7deg)}.brow.r{right:16%;transform:rotate(7deg)}.eye{top:50%;width:14%;height:7px;background:#251a18;border-radius:50%}.eye.l{left:21%}.eye.r{right:21%}.nose{left:48%;top:51%;width:6%;height:17%;border-right:2px solid #59312088;border-bottom:2px solid #59312088;border-radius:0 0 60% 0}.mouth{left:35%;bottom:17%;width:30%;height:8%;border-bottom:4px solid #712b2f;border-radius:50%}.mole{position:absolute;right:17%;top:61%;width:clamp(17px,5vw,25px);height:clamp(17px,5vw,25px);border-radius:50%;background:#261b18;border:2px solid #ffffff33;z-index:9;transition:.45s;box-shadow:0 2px 4px #0006}.mole.red{background:#b3262e;box-shadow:0 0 9px #b3262eb3}.mole.shifted{top:67%;right:12%;transform:rotate(24deg)}.mole.falling{animation:fall 1.1s ease-in forwards}@keyframes fall{55%{opacity:1;transform:translate(12px,95px) rotate(250deg)}100%{opacity:0;transform:translate(20px,210px) rotate(520deg)}}
.target{position:absolute;left:50%;top:50%;width:72%;height:58%;transform:translate(-50%,-50%);z-index:14;border:0;background:transparent;cursor:pointer;touch-action:manipulation}.throw{position:absolute;width:34px;height:43px;display:none;place-items:center;border-radius:48%;background:var(--gold);border:3px solid #8b6512;box-shadow:inset 0 0 0 4px #f3ce63,0 6px 12px #0005;color:#654200;font:800 14px sans-serif;z-index:30}.throw.fly{display:grid;animation:fly .52s cubic-bezier(.2,.7,.3,1) forwards}@keyframes fly{from{left:8%;bottom:6%;transform:rotate(0) scale(.75)}to{left:61%;bottom:46%;transform:rotate(650deg) scale(1)}}.effect{position:absolute;left:67%;top:48%;z-index:31;font:900 clamp(24px,8vw,48px) sans-serif;opacity:0;transform:translate(-50%,-50%);color:var(--red);text-shadow:2px 2px #fff4cf}.effect.show{animation:pop .65s ease-out}@keyframes pop{35%{opacity:1;transform:translate(-50%,-50%) scale(1.25)}100%{opacity:0;transform:translate(-50%,-75%) scale(1)}}.message{position:absolute;left:50%;bottom:4.5%;transform:translateX(-50%);z-index:22;width:min(90%,560px);min-height:76px;display:grid;place-items:center;padding:13px 18px;text-align:center;line-height:1.55;background:#fffbeeee;border:3px solid var(--wood);border-radius:9px;box-shadow:0 7px 16px #0004;font-size:clamp(15px,4vw,20px)}.message strong{color:var(--red)}
.overlay{position:absolute;inset:0;z-index:50;display:grid;place-items:center;padding:24px;background:linear-gradient(#18120e99,#18120ecc),radial-gradient(circle at 50% 20%,#b88952,#34251c 70%);color:#fff7de;text-align:center;transition:.45s}.overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}.card{width:min(100%,500px);padding:26px 20px;background:#461b18e8;border:5px double #e2bd62;box-shadow:0 12px 30px #0007}.small{font:13px sans-serif;letter-spacing:.18em;opacity:.85}.card h2{font-size:clamp(30px,9vw,50px);margin:8px 0 12px}.card p{font-size:clamp(15px,4vw,19px);line-height:1.75}.btn{width:min(100%,320px);min-height:50px;border-radius:999px;padding:10px 18px;font-weight:700;cursor:pointer}.primary{border:2px solid #fff0b5;background:var(--gold);color:#3c2705;box-shadow:0 5px 0 #8b6512}.secondary{margin-top:12px;border:1px solid #fff;background:transparent;color:#fff7de}.ending{background:#110e0bdd}.congrats{font:clamp(26px,8vw,44px) Georgia,serif!important;color:#f5cf68;margin:0!important}.trivia{margin:16px auto 18px;padding:12px 14px;background:#fff5d8;color:#3d2b22;border-radius:7px;text-align:left;line-height:1.6;font-size:14px}.spark{position:absolute;z-index:40;pointer-events:none;animation:sparkle 1.2s ease-out forwards}@keyframes sparkle{to{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.3) rotate(260deg)}}
@media(max-height:620px){.bar{height:48px}.hud{padding:6px 12px}.stage{min-height:calc(100svh - 94px)}.house{top:7%;bottom:4%}.message{min-height:58px;padding:8px 13px}.person{max-height:63%}}
</style>
</head>
<body>
<main class="app">
<header class="bar"><h1>引窓 Story</h1><a href="../">ゲーム選択へ</a></header>
<section class="hud"><p id="instruction">小判を投げて、長五郎のほくろを落とそう。</p><div class="coins"><span class="coin">一</span><span class="coin">二</span><span class="coin">三</span></div></section>
<section class="stage" id="stage">
<div class="moon"></div>
<div class="house"><div class="room"></div><div class="tatami"></div>
<div class="person" id="person"><div class="body"></div><div class="head"><div class="hair"></div><span class="brow l"></span><span class="brow r"></span><span class="eye l"></span><span class="eye r"></span><span class="nose"></span><span class="mouth"></span><span class="mole" id="mole"></span></div></div>
<div class="shoji" id="shoji"><div class="panel left"></div><div class="panel right"></div></div>
<button class="target" id="target" type="button" aria-label="長五郎に小判を投げる"></button></div>
<div class="throw" id="throw">小</div><div class="effect" id="effect">命中！</div>
<div class="message" id="message" aria-live="polite">画面をタップして、小判を投げます。</div>
</section>
<section class="overlay" id="start"><div class="card"><div class="small">STORY MODE</div><h2>引窓</h2><p>部屋の中にいる長五郎。<br>小判を三度当てて大きなほくろを落とし、<br>人相を変えて逃がしてください。</p><button class="btn primary" id="startBtn">物語をはじめる</button></div></section>
<section class="overlay ending hidden" id="ending"><div class="card"><p class="congrats">Congratulations!</p><h2>人相が変わった！</h2><p>長五郎は無事に逃げることができました。</p><div class="trivia"><strong>『引窓』豆知識</strong><br>このゲームは歌舞伎『双蝶々曲輪日記』の「引窓」の場面をもとにしています。長五郎の顔のほくろが落ち、人相が変わることが逃亡を助ける鍵になります。</div><button class="btn primary" id="replay">もう一度遊ぶ</button><button class="btn secondary" id="menu">ゲーム選択へ戻る</button></div></section>
</main>
<script>
(()=>{const q=id=>document.getElementById(id),start=q('start'),startBtn=q('startBtn'),target=q('target'),throwCoin=q('throw'),effect=q('effect'),mole=q('mole'),person=q('person'),shoji=q('shoji'),message=q('message'),instruction=q('instruction'),ending=q('ending'),replay=q('replay'),menu=q('menu'),stage=q('stage'),coins=[...document.querySelectorAll('.coin')];let hits=0,playing=false,locked=false;const texts=['','<strong>一度目、命中！</strong><br>ほくろが赤くなりました。','<strong>二度目、命中！</strong><br>ほくろがぐらりとずれました。','<strong>三度目、命中！</strong><br>ほくろが落ちて、人相が変わった！'];function coinAnim(){throwCoin.classList.remove('fly');void throwCoin.offsetWidth;throwCoin.classList.add('fly');effect.classList.remove('show');void effect.offsetWidth;setTimeout(()=>effect.classList.add('show'),330)}function spark(){const sy=['✦','✧','★','小'],r=stage.getBoundingClientRect();for(let i=0;i<18;i++){const s=document.createElement('span');s.className='spark';s.textContent=sy[Math.floor(Math.random()*sy.length)];s.style.left=(r.width*.5+(Math.random()-.5)*70)+'px';s.style.top=(r.height*.45+(Math.random()-.5)*50)+'px';s.style.setProperty('--dx',((Math.random()-.5)*300)+'px');s.style.setProperty('--dy',((Math.random()-.5)*260)+'px');s.style.fontSize=(16+Math.random()*18)+'px';s.style.color=Math.random()>.5?'#f4cf67':'#fff4cf';stage.appendChild(s);setTimeout(()=>s.remove(),1300)}}function update(){hits++;coins[hits-1].classList.add('used');message.innerHTML=texts[hits];if(hits===1){mole.classList.add('red');instruction.textContent='あと二回。赤くなったほくろをもう一度狙おう。'}else if(hits===2){mole.classList.add('shifted');person.classList.add('mie');setTimeout(()=>person.classList.remove('mie'),1150);instruction.textContent='あと一回。ずれたほくろを落とそう。'}else{instruction.textContent='人相が変わった。長五郎を逃がそう！';mole.classList.add('falling');spark();setTimeout(()=>{shoji.classList.add('open');message.innerHTML='<strong>障子が開いた！</strong><br>長五郎、今のうちに！'},850);setTimeout(()=>{person.classList.add('escape');message.innerHTML='<strong>長五郎は部屋を飛び出し、逃げていきました。</strong>'},1650);setTimeout(()=>ending.classList.remove('hidden'),3150);playing=false}}function toss(){if(!playing||locked||hits>=3)return;locked=true;coinAnim();setTimeout(update,470);setTimeout(()=>locked=false,800)}function reset(){hits=0;playing=true;locked=false;coins.forEach(c=>c.classList.remove('used'));mole.className='mole';person.className='person';shoji.classList.remove('open');message.innerHTML='画面をタップして、小判を投げます。';instruction.textContent='小判を投げて、長五郎のほくろを落とそう。';ending.classList.add('hidden')}startBtn.addEventListener('click',()=>{start.classList.add('hidden');reset()});target.addEventListener('click',toss);replay.addEventListener('click',reset);menu.addEventListener('click',()=>location.href='../');window.addEventListener('keydown',e=>{if((e.key==='Enter'||e.key===' ')&&playing){e.preventDefault();toss()}})})();
</script>
</body>
</html>
