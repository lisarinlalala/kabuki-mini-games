<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>妄想歌舞伎ゲーム「引窓」</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#ead8ae;color:#26150d;font-family:system-ui,-apple-system,"Yu Gothic",sans-serif;display:flex;justify-content:center}.app{width:min(100%,520px);min-height:100vh;background:#fff8e8}.head{padding:14px 16px;background:linear-gradient(135deg,#d66a20,#b93e10);color:#fff;border-bottom:5px solid #5b2914}.head h1{margin:0;font-size:25px}.head p{margin:4px 0 0;font-size:13px}.hud{display:grid;grid-template-columns:repeat(3,1fr);text-align:center;background:#fff0c9;padding:9px;font-weight:700}.hud span{display:block;font-size:21px;color:#9a3510}.wrap{position:relative;padding:10px}canvas{display:block;width:100%;aspect-ratio:9/14;border:4px solid #28160e;touch-action:manipulation}.overlay{position:absolute;inset:10px;background:#24140bb8;display:flex;align-items:center;justify-content:center;padding:20px}.card{background:#fff8e7;border:4px solid #8b3d17;border-radius:14px;padding:20px;text-align:center;max-width:360px}.card h2{margin:0 0 10px}.card p{line-height:1.65}.card button{border:0;border-radius:30px;padding:13px 24px;background:#d65b18;color:#fff;font-weight:800;font-size:16px;box-shadow:0 4px 0 #7b2d0e}.note{padding:4px 16px 18px;line-height:1.7;font-size:14px}.tag{display:inline-block;margin:3px;padding:4px 8px;border-radius:20px;background:#f2dfb4;border:1px solid #d0ae6e}
</style>

<style id="series-back-style">
.series-back{
  position:fixed;z-index:9999;top:max(10px,env(safe-area-inset-top));left:10px;
  display:inline-block;padding:8px 12px;border-radius:999px;
  background:rgba(35,18,10,.88);color:#fff!important;text-decoration:none;
  font:700 13px/1 system-ui,-apple-system,"Yu Gothic",sans-serif;
  box-shadow:0 2px 8px rgba(0,0,0,.25)
}
</style>

</head>
<body>
<a class="series-back" href="../" aria-label="ゲーム一覧へ戻る">← ゲーム一覧</a>
<div class="app">
  <div class="head"><h1>妄想歌舞伎ゲーム「引窓」</h1><p>狙いたい場所をタップして、小判を投げよう！</p></div>
  <div class="hud"><div>命中<span id="hits">0 / 3</span></div><div>残り時間<span id="time">30</span></div><div>得点<span id="score">0</span></div></div>
  <div class="wrap">
    <canvas id="game" width="450" height="700"></canvas>
    <div class="overlay" id="overlay"><div class="card"><h2>遊び方</h2><p>画面の<strong>狙いたい場所をタップ</strong>すると、小判が飛びます。</p><p>長五郎が<strong>見得を切って止まった瞬間</strong>が狙い目です。</p><p>顔に3回命中で成功！</p><button id="start">ゲーム開始</button></div></div>
  </div>
  <div class="note">長五郎は時々「見得」を切って停止します。<br><span class="tag">顔 ＋500</span><span class="tag">犬 −100</span><span class="tag">女性 −300</span></div>
</div>
<script>
const c=document.getElementById("game"),x=c.getContext("2d"),ov=document.getElementById("overlay");
const he=document.getElementById("hits"),te=document.getElementById("time"),se=document.getElementById("score");
let run=false,score=0,hits=0,time=30,last=0,acc=0,coins=[],fx=[];
const P={x:225,y:625},T={x:225,y:155,vx:92,w:44,h:62,mie:false,mt:0,next:2};
const W=[{x:95,y:195,vx:40,w:34,h:54},{x:350,y:210,vx:-48,w:34,h:54}];
const D=[{x:85,y:405,vx:72,w:44,h:27},{x:315,y:495,vx:-58,w:44,h:27}];
function hud(){he.textContent=hits+" / 3";te.textContent=time;se.textContent=score}
function reset(){score=hits=acc=0;time=30;coins=[];fx=[];T.x=225;T.vx=92;T.mie=false;T.mt=0;T.next=1.8+Math.random()*1.5;W[0].x=95;W[1].x=350;D[0].x=85;D[1].x=315;hud()}
function start(){reset();run=true;ov.style.display="none";last=performance.now();requestAnimationFrame(loop)}
function end(ok){run=false;ov.style.display="flex";ov.innerHTML='<div class="card"><h2>'+(ok?"長五郎、逃走成功！":"時間切れ…")+'</h2><p>'+(ok?"ほくろを落として、人相を変えられました。":"見得で止まった瞬間を狙ってみましょう。")+'</p><p><strong>得点：'+score+'</strong></p><button id="again">もう一度遊ぶ</button></div>';document.getElementById("again").onclick=start}
function add(tx,ty){let dx=tx-P.x,dy=ty-(P.y-18),d=Math.max(1,Math.hypot(dx,dy)),s=630;coins.push({x:P.x,y:P.y-18,vx:dx/d*s,vy:dy/d*s,r:8,a:true})}
function hit(q,o){return q.x>o.x-o.w/2&&q.x<o.x+o.w/2&&q.y>o.y-o.h/2&&q.y<o.y+o.h/2}
function msg(px,py,t){fx.push({x:px,y:py,t,life:1})}
function update(dt){
 if(T.mie){T.mt-=dt;if(T.mt<=0){T.mie=false;T.next=2+Math.random()*2.2}}
 else{T.next-=dt;if(T.next<=0){T.mie=true;T.mt=1.2;msg(T.x,T.y-55,"見得！")}else{T.x+=T.vx*dt;if(T.x<65||T.x>385)T.vx*=-1}}
 W.forEach(o=>{o.x+=o.vx*dt;if(o.x<50||o.x>400)o.vx*=-1});
 D.forEach(o=>{o.x+=o.vx*dt;if(o.x<45||o.x>405)o.vx*=-1});
 coins.forEach(q=>{q.x+=q.vx*dt;q.y+=q.vy*dt;
   if(q.a&&hit(q,T)){q.a=false;hits++;score+=500;msg(q.x,q.y,T.mie?"大当たり！ +500":"命中！ +500");hud();if(hits>=3)setTimeout(()=>end(true),180)}
   W.forEach(o=>{if(q.a&&hit(q,o)){q.a=false;score=Math.max(0,score-300);msg(q.x,q.y,"誤射 -300");hud()}});
   D.forEach(o=>{if(q.a&&hit(q,o)){q.a=false;score=Math.max(0,score-100);msg(q.x,q.y,"犬 -100");hud()}});
   if(q.x<-30||q.x>480||q.y<-30||q.y>730)q.a=false});
 coins=coins.filter(q=>q.a);fx.forEach(f=>{f.y-=22*dt;f.life-=dt});fx=fx.filter(f=>f.life>0);
 acc+=dt;if(acc>=1){acc--;time--;hud();if(time<=0)end(false)}
}
function rect(px,py,w,h,col){x.fillStyle=col;x.fillRect(Math.round(px-w/2),Math.round(py-h/2),w,h)}
function actor(px,py,target=false,blue=false){
 x.save();x.translate(px,py);
 if(target&&T.mie){x.strokeStyle="#f5c536";x.lineWidth=5;x.beginPath();x.arc(0,-5,47,0,7);x.stroke()}
 rect(0,10,target?36:30,target?42:38,target?"#79509a":blue?"#6a8dcc":"#d06b86");rect(0,-16,target?30:25,target?28:25,"#f2d0ae");rect(0,-30,target?34:28,11,"#111");
 if(target){x.fillStyle="#111";x.fillRect(-13,-24,5,5);x.fillRect(8,-24,5,5);x.fillStyle="#b42020";x.fillRect(-2,-12,5,5);x.fillStyle="#fff";x.font="bold 11px sans-serif";x.textAlign="center";x.fillText("長五郎",0,42)}
 x.restore()
}
function dog(o){x.save();x.translate(o.x,o.y);rect(0,0,38,20,"#6c3b19");rect(18,-7,17,16,"#6c3b19");rect(24,-16,6,9,"#351a0d");rect(12,-16,6,9,"#351a0d");x.restore()}
function draw(){
 x.clearRect(0,0,450,700);x.fillStyle="#c9bd88";x.fillRect(0,0,450,700);x.fillStyle="#9d6b43";x.fillRect(0,0,450,105);x.fillStyle="#e9e2cc";x.fillRect(55,20,115,70);x.fillRect(280,20,115,70);x.fillStyle="#21170f";x.fillRect(185,20,80,85);
 actor(T.x,T.y,true);actor(W[0].x,W[0].y);actor(W[1].x,W[1].y,false,true);D.forEach(dog);
 x.save();x.translate(P.x,P.y);rect(0,0,50,45,"#d5a33e");rect(0,-30,34,30,"#f2d0ae");rect(0,-45,38,13,"#111");x.fillStyle="#fff";x.font="bold 12px sans-serif";x.textAlign="center";x.fillText("与兵衛",0,35);x.restore();
 coins.forEach(q=>{x.beginPath();x.arc(q.x,q.y,q.r,0,7);x.fillStyle="#f6c12a";x.fill();x.strokeStyle="#875800";x.lineWidth=2;x.stroke()});
 fx.forEach(f=>{x.globalAlpha=Math.max(0,f.life);x.fillStyle="#8d1f10";x.font="bold 18px sans-serif";x.textAlign="center";x.fillText(f.t,f.x,f.y);x.globalAlpha=1})
}
function loop(now){if(!run){draw();return}let dt=Math.min((now-last)/1000,.035);last=now;update(dt);draw();if(run)requestAnimationFrame(loop)}
function pos(e){let r=c.getBoundingClientRect();return{x:(e.clientX-r.left)*450/r.width,y:(e.clientY-r.top)*700/r.height}}
c.addEventListener("pointerdown",e=>{if(run){let p=pos(e);add(p.x,p.y)}});
document.getElementById("start").onclick=start;draw();
</script>
</body></html>
